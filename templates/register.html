
{% extends 'layout.html' %}

{% block title %}Register New Student{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-user-plus mr-2"></i> Register New Student</h5>
            </div>
            <div class="card-body">
                <form id="register-form" method="post" enctype="multipart/form-data" novalidate>
                    <div class="form-row">
                        <div class="form-group col-md-6">
                            <div class="form-label-group">
                                <input type="text" id="name" name="name" class="form-control" placeholder="Name" required>
                                <label for="name">Name</label>
                            </div>
                        </div>
                        <div class="form-group col-md-6">
                            <div class="form-label-group">
                                <input type="text" id="faculty" name="faculty" class="form-control" placeholder="Faculty">
                                <label for="faculty">Faculty</label>
                            </div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group col-md-6">
                             <div class="form-label-group">
                                <input type="date" id="dob" name="dob" class="form-control" placeholder="Date of Birth">
                                <label for="dob">Date of Birth</label>
                            </div>
                        </div>
                        <div class="form-group col-md-6">
                            <div class="form-label-group">
                                <input type="email" id="email" name="email" class="form-control" placeholder="Email">
                                <label for="email">Email</label>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <div class="form-label-group">
                            <input type="text" id="address" name="address" class="form-control" placeholder="Address">
                            <label for="address">Address</label>
                        </div>
                    </div>

                    <hr class="my-4">

                    <div class="form-group">
                        <label class="mb-3">Face Image</label>
                        <div class="row align-items-center">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <button type="button" class="btn btn-outline-secondary btn-block mb-3" data-toggle="modal" data-target="#cameraModal">
                                    <i class="fas fa-camera mr-2"></i> Capture with Camera
                                </button>
                                <div class="custom-file">
                                    <input type="file" class="custom-file-input" id="face_image_file" name="face_image_file" accept="image/*">
                                    <label class="custom-file-label" for="face_image_file">Or choose a file...</label>
                                </div>
                            </div>
                            <div class="col-md-6 text-center">
                                <img id="preview" class="img-fluid" style="max-height: 180px; border-radius: 8px; display: none; border: 2px solid var(--border-color);"/>
                                <div id="preview-placeholder" class="text-muted">
                                    <i class="fas fa-image fa-3x"></i>
                                    <p>Image Preview</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Hidden field for captured image data -->
                    <input type="hidden" name="face_image_data" id="face_image_data">

                    <hr class="my-4">

                    <button type="submit" class="btn btn-primary btn-lg btn-block"><i class="fas fa-plus-circle mr-2"></i> Register Student</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Camera Modal -->
<div class="modal fade" id="cameraModal" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content" style="background-color: var(--card-bg); border: 1px solid var(--border-color);">
            <div class="modal-header" style="border-bottom: 1px solid var(--border-color);">
                <h5 class="modal-title"><i class="fas fa-camera-retro mr-2"></i> Capture Photo</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close" style="color: var(--primary-text);">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body text-center">
                <div class="form-group">
                    <label for="camera-select">Select Camera:</label>
                    <select id="camera-select" class="form-control"></select>
                </div>
                <video id="video" width="640" height="480" autoplay playsinline style="border-radius: 8px; background-color: #000;"></video>
                <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
            </div>
            <div class="modal-footer" style="border-top: 1px solid var(--border-color);">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                <button type="button" id="snap" class="btn btn-primary"><i class="fas fa-camera"></i> Snap Photo</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<style>
    /* Floating Label styles */
    .form-label-group {
        position: relative;
        margin-bottom: 1rem;
    }
    .form-label-group .form-control {
        height: auto;
        padding: 1.2rem 1rem;
    }
    .form-label-group > label {
        position: absolute;
        top: 0;
        left: 0;
        display: block;
        width: 100%;
        margin-bottom: 0;
        line-height: 1.5;
        color: #a9b3c1;
        border: 1px solid transparent;
        border-radius: .25rem;
        transition: all .1s ease-in-out;
        padding: 1.2rem 1rem;
        pointer-events: none;
    }
    .form-label-group input:not(:placeholder-shown) ~ label,
    .form-label-group input:focus ~ label {
        top: -1.1rem;
        left: .8rem;
        font-size: 0.8rem;
        color: var(--accent);
        background: var(--card-bg);
        padding: 0.2rem 0.4rem;
        width: auto;
    }
    /* Fix for date input label which is never empty */
    .form-label-group input[type="date"] ~ label {
        top: -1.1rem;
        left: .8rem;
        font-size: 0.8rem;
        color: var(--accent);
        background: var(--card-bg);
        padding: 0.2rem 0.4rem;
        width: auto;
    }
    .custom-file-label {
        background-color: var(--secondary-bg);
        border-color: var(--border-color);
        color: var(--secondary-text);
    }
    .custom-file-label::after {
        background-color: var(--secondary-bg);
        color: var(--primary-text);
    }
</style>
<script>
    (function() {
        'use strict';
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const snap = document.getElementById('snap');
        const imageDataInput = document.getElementById('face_image_data');
        const fileInput = document.getElementById('face_image_file');
        const preview = document.getElementById('preview');
        const previewPlaceholder = document.getElementById('preview-placeholder');
        const cameraSelect = document.getElementById('camera-select');
        let currentStream;

        async function getCameras() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');
                cameraSelect.innerHTML = '';
                videoDevices.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Camera ${index + 1}`;
                    cameraSelect.appendChild(option);
                });
            } catch (err) {
                console.error("Error enumerating devices: ", err);
            }
        }

        async function startCamera(deviceId) {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
            const constraints = {
                video: { deviceId: deviceId ? { exact: deviceId } : undefined, width: { ideal: 1280 }, height: { ideal: 720 } }
            };
            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = currentStream;
            } catch (err) {
                console.error("Error accessing camera: ", err);
                alert("Could not access the camera. Please ensure you have given permission and the camera is not in use by another app.");
            }
        }

        $('#cameraModal').on('shown.bs.modal', async function () {
            await getCameras();
            if (cameraSelect.value) {
                startCamera(cameraSelect.value);
            }
        });

        $('#cameraModal').on('hidden.bs.modal', function () {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
        });

        cameraSelect.addEventListener('change', () => {
            startCamera(cameraSelect.value);
        });

        snap.addEventListener('click', function() {
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 640, 480);
            const dataUrl = canvas.toDataURL('image/jpeg');
            imageDataInput.value = dataUrl;
            preview.src = dataUrl;
            preview.style.display = 'block';
            previewPlaceholder.style.display = 'none';
            fileInput.value = ''; // Clear file input
            $('.custom-file-label').text('Or choose a file...');
            $('#cameraModal').modal('hide');
        });

        fileInput.addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = function(event) {
                    preview.src = event.target.result;
                    preview.style.display = 'block';
                    previewPlaceholder.style.display = 'none';
                    imageDataInput.value = ''; // Clear captured data
                }
                reader.readAsDataURL(file);
                document.querySelector('.custom-file-label').innerText = file.name;
            }
        });

        document.getElementById('register-form').addEventListener('submit', function(e) {
            if (!imageDataInput.value && !fileInput.files[0]) {
                e.preventDefault();
                alert('Please capture a photo or select an image file.');
            }
        });
    })();
</script>
{% endblock %}
